<html lang="en">

<head>

    <link rel="stylesheet" href="./css/style.css">

<body>
    <header>
        <nav class="top_nav">
            <h1>PARFUMESHOP</h1>
            <div class="icon_menu">

            </div>
        </nav>
        <nav class="bottom_nav">
            <button class="bars"><i class="fa-solid fa-bars"></i></button>
            <ul class="menu_list">
                <li><a href="" class="active">Product</a></li>
                <li><a href="product.html">Brand</a></li>

            </ul>
            <div class="icon_menu">

    <section class="filters">
    </section>

            <ul class="bag_list">
